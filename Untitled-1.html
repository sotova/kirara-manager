<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>きららライブラリ Next</title>
  <style>
    :root{--accent:#ff6fa5;--accent2:#e24b8a;--bg:#f4f7fc;--panel:#fff;--text:#1f2c40;--muted:#667892;--line:#dfe7f2;--ok:#1f9d62;--want:#2c73d8;--drop:#c34555}
    body[data-theme="dark"]{--bg:#121821;--panel:#1b2431;--text:#edf3ff;--muted:#9eb0ca;--line:#2b3a4f}
    *{box-sizing:border-box} body{margin:0;font-family:"Yu Gothic","Meiryo",sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1400px;margin:0 auto;padding:20px}
    .hero,.panel,.card,.detail{background:var(--panel);border:1px solid var(--line);border-radius:16px}
    .hero{padding:16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:8px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.tab{padding:10px 14px;border:1px solid var(--line);border-radius:999px;background:transparent;cursor:pointer}.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none}
    .layout{display:grid;grid-template-columns:340px 1fr;gap:14px}
    .panel{padding:12px}.stack{display:grid;gap:8px} input,select,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--text)}
    button{cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;font-weight:700}.secondary{background:transparent!important;color:var(--text)!important;border:1px solid var(--line)!important}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
    .card{overflow:hidden;cursor:pointer}.thumb{width:100%;aspect-ratio:3/4;object-fit:cover;background:#d8e3f5}.card-body{padding:10px}.title{margin:0;font-weight:700}.sub{margin:4px 0 0;color:var(--muted);font-size:12px}
    .attr{display:grid;grid-template-columns:110px 1fr;gap:8px;padding:6px 0;border-bottom:1px dashed var(--line)} .attr b{color:var(--muted)}
    .detail{padding:14px;margin-top:12px}.hide{display:none}.badge{display:inline-block;padding:3px 9px;border-radius:999px;color:#fff;font-size:12px}.read{background:var(--ok)}.want{background:var(--want)}.dropped{background:var(--drop)}
    @media (max-width:1000px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <section class="hero"><h1>きらら作品ライブラリ Next</h1><button id="themeBtn" class="secondary">テーマ切替</button></section>
  <div class="tabs">
    <button class="tab active" data-page="home">ホーム（ランダム）</button>
    <button class="tab" data-page="list">作品一覧</button>
    <button class="tab" data-page="library">ライブラリ管理</button>
  </div>
  <div class="layout">
    <aside class="panel">
      <h3>作品追加フォーム（常時表示）</h3>
      <div class="stack">
        <select id="fType"><option value="manga">漫画</option><option value="anime">アニメ</option></select>
        <input id="fTitle" placeholder="タイトル" />
        <input id="fVolume" type="number" min="1" placeholder="巻数（漫画のみ）" />
        <input id="fAuthor" placeholder="作者" />
        <input id="fLabel" placeholder="レーベル / 放送" />
        <input id="fDate" type="date" />
        <input id="fThumb" placeholder="画像URL" />
        <textarea id="fSummary" rows="4" placeholder="あらすじ"></textarea>
        <button id="addBtn">作品を追加</button>
      </div>
      <hr>
      <div class="stack">
        <input id="searchInput" placeholder="検索（タイトル・作者・レーベル）" />
        <select id="statusFilter"><option value="all">状態: 全て</option><option value="read">読了</option><option value="want">積み</option><option value="dropped">断念</option><option value="none">未設定</option></select>
        <button id="clearBtn" class="secondary">フィルタリセット</button>
      </div>
    </aside>
    <main>
      <section id="homePage" class="panel"></section>
      <section id="listPage" class="panel hide"><div id="cards" class="grid"></div></section>
      <section id="libraryPage" class="panel hide"><div id="libraryStats"></div></section>
      <section id="detail" class="detail hide"></section>
    </main>
  </div>
</div>
<script>
const KEY='kirara_site_v4';
let data=JSON.parse(localStorage.getItem(KEY)||'{"items":[],"state":{}}');
const byId=id=>document.getElementById(id);
const save=()=>localStorage.setItem(KEY,JSON.stringify(data));
const badge=s=>s==='read'?'<span class="badge read">読了</span>':s==='want'?'<span class="badge want">積み</span>':s==='dropped'?'<span class="badge dropped">断念</span>':'';

function addItem(){
  const title=byId('fTitle').value.trim(); if(!title) return alert('タイトル必須');
  const item={id:'item_'+Date.now(),type:byId('fType').value,title,volume:Number(byId('fVolume').value)||null,author:byId('fAuthor').value.trim(),label:byId('fLabel').value.trim(),release_date:byId('fDate').value,thumbnail:byId('fThumb').value.trim(),summary:byId('fSummary').value.trim()};
  data.items.push(item); save(); render();
}

function filtered(){
  const q=byId('searchInput').value.trim().toLowerCase(), sf=byId('statusFilter').value;
  return data.items.filter(i=>{
    const s=(data.state[i.id]?.status)||'none';
    const text=[i.title,i.author,i.label].filter(Boolean).join(' ').toLowerCase();
    return text.includes(q) && (sf==='all'||sf===s);
  });
}

function renderCards(){
  const root=byId('cards'); root.innerHTML='';
  for(const i of filtered()){
    const st=(data.state[i.id]?.status)||'none';
    const div=document.createElement('article'); div.className='card'; div.onclick=()=>renderDetail(i.id);
    div.innerHTML=`<img class="thumb" src="${i.thumbnail||'https://via.placeholder.com/300x400?text=No+Image'}"><div class="card-body"><p class="title">${i.title}</p><p>${badge(st)}</p><p class="sub">${i.author||'-'} / ${i.label||'-'}</p></div>`;
    root.appendChild(div);
  }
}

function renderHome(){
  const el=byId('homePage');
  if(!data.items.length){el.innerHTML='<h3>ホーム</h3><p>作品を追加するとランダム表示されます。</p>';return;}
  const pick=data.items[Math.floor(Math.random()*data.items.length)];
  el.innerHTML=`<h3>ホーム（ランダム作品）</h3><p><b>${pick.title}</b> ${pick.volume?pick.volume+'巻':''}</p><p>${pick.summary||'説明なし'}</p><button onclick="renderDetail('${pick.id}')">詳細を開く</button>`;
}

function renderLibrary(){
  const total=data.items.length; const read=data.items.filter(i=>data.state[i.id]?.status==='read').length;
  byId('libraryStats').innerHTML=`<h3>ライブラリ</h3><p>登録総数: <b>${total}</b></p><p>読了数: <b>${read}</b></p><p>初期データは廃止。全作品を追加・編集・削除できます。</p>`;
}

function renderDetail(id){
  const i=data.items.find(x=>x.id===id); if(!i) return;
  const st=data.state[i.id]||{status:'none',rating:0,comment:''};
  byId('detail').classList.remove('hide');
  byId('detail').innerHTML=`<h3>作品情報編集</h3>
    <div class='attr'><b>タイトル</b><input id='eTitle' value='${i.title||''}'></div>
    <div class='attr'><b>区分</b><select id='eType'><option value='manga' ${i.type==='manga'?'selected':''}>漫画</option><option value='anime' ${i.type==='anime'?'selected':''}>アニメ</option></select></div>
    <div class='attr'><b>巻数</b><input id='eVolume' type='number' min='1' value='${i.volume||''}'></div>
    <div class='attr'><b>作者</b><input id='eAuthor' value='${i.author||''}'></div>
    <div class='attr'><b>レーベル/放送</b><input id='eLabel' value='${i.label||''}'></div>
    <div class='attr'><b>発売日</b><input id='eDate' type='date' value='${i.release_date||''}'></div>
    <div class='attr'><b>画像URL</b><input id='eThumb' value='${i.thumbnail||''}'></div>
    <div class='attr'><b>あらすじ</b><textarea id='eSummary'>${i.summary||''}</textarea></div>
    <div class='attr'><b>ステータス</b><select id='eStatus'><option value='none' ${st.status==='none'?'selected':''}>未設定</option><option value='read' ${st.status==='read'?'selected':''}>読了</option><option value='want' ${st.status==='want'?'selected':''}>積み</option><option value='dropped' ${st.status==='dropped'?'selected':''}>断念</option></select></div>
    <div class='attr'><b>評価</b><input id='eRating' type='number' min='0' max='5' value='${st.rating||0}'></div>
    <div class='attr'><b>メモ</b><textarea id='eComment'>${st.comment||''}</textarea></div>
    <p style='display:flex;gap:8px'><button onclick="saveDetail('${i.id}')">保存</button><button class='secondary' onclick="deleteItem('${i.id}')">削除</button></p>`;
}

function saveDetail(id){
  const i=data.items.find(x=>x.id===id); if(!i) return;
  i.title=byId('eTitle').value.trim(); i.type=byId('eType').value; i.volume=Number(byId('eVolume').value)||null; i.author=byId('eAuthor').value.trim(); i.label=byId('eLabel').value.trim(); i.release_date=byId('eDate').value; i.thumbnail=byId('eThumb').value.trim(); i.summary=byId('eSummary').value.trim();
  data.state[id]={status:byId('eStatus').value,rating:Number(byId('eRating').value)||0,comment:byId('eComment').value.trim()};
  save(); render();
}
function deleteItem(id){ if(!confirm('この作品を削除します。よろしいですか？')) return; data.items=data.items.filter(i=>i.id!==id); delete data.state[id]; save(); byId('detail').classList.add('hide'); render(); }

function switchPage(page){['home','list','library'].forEach(p=>{byId(p+'Page').classList.toggle('hide',p!==page);});document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.page===page)); if(page==='home')renderHome(); if(page==='library')renderLibrary();}
function render(){renderCards(); renderHome(); renderLibrary();}

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchPage(t.dataset.page));
byId('addBtn').onclick=addItem; byId('searchInput').oninput=renderCards; byId('statusFilter').onchange=renderCards; byId('clearBtn').onclick=()=>{byId('searchInput').value='';byId('statusFilter').value='all';renderCards();};
byId('themeBtn').onclick=()=>{document.body.dataset.theme=document.body.dataset.theme==='dark'?'light':'dark';};
render();
</script>
</body>
</html>
